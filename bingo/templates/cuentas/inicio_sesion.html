{% extends 'comunes/base.html' %}
{% block title %}Acceder - CoopBingo{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 75vh;">
    <div class="col-12 col-sm-10 col-md-6 col-lg-4">
        <div class="card-minimalista p-5">
            <div class="text-center mb-4">
                <div class="rounded-circle bg-primary bg-opacity-10 text-primary d-inline-flex align-items-center justify-content-center mb-3" style="width: 60px; height: 60px; font-size: 24px;">
                    <i class="fas fa-fingerprint"></i>
                </div>
                <h4 class="fw-bold mb-1">Iniciar Sesión</h4>
                <p class="text-secondary small">Accede a tu panel de control o sala de juegos</p>
            </div>

        

            <form method="post" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label small fw-semibold text-secondary">Cédula / Administrador / Correo</label>
                    <input type="text" name="identificador" class="form-control bg-transparent" placeholder="Ej: 1300000000 o admin" required>
                </div>
                <div class="mb-4">
                    <label class="form-label small fw-semibold text-secondary">Contraseña</label>
                    <input type="password" name="password" class="form-control bg-transparent" required>
                </div>
                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-indigo py-2 shadow-sm">Acceder al Sistema</button>
                </div>
            </form>
            <div class="text-center border-top pt-3 mt-4">
                <p class="small text-secondary mb-0">¿Eres nuevo? <a href="{% url 'seleccion_registro' %}" class="fw-bold text-decoration-none">Regístrate aquí</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
