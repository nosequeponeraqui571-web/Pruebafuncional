{% if messages %}
<div class="toast-container position-fixed top-0 end-0 p-4" style="z-index: 1055;">
    {% for message in messages %}
        <div class="toast align-items-center border-0 shadow-lg animate__animated animate__slideInRight mb-3 
            {% if message.tags == 'error' %}bg-danger text-white
            {% elif message.tags == 'success' %}bg-success text-white
            {% elif message.tags == 'warning' %}bg-warning text-dark
            {% elif message.tags == 'info' %}bg-info text-dark
            {% else %}bg-primary text-white{% endif %}" 
            role="alert" aria-live="assertive" aria-atomic="true" data-bs-delay="5000">
            
            <div class="d-flex">
                <div class="toast-body fw-medium fs-6 d-flex align-items-center">
                    {% if message.tags == 'success' %}
                        <i class="fas fa-check-circle me-2 fs-5"></i>
                    {% elif message.tags == 'error' %}
                        <i class="fas fa-exclamation-triangle me-2 fs-5"></i>
                    {% elif message.tags == 'warning' %}
                        <i class="fas fa-exclamation-circle me-2 fs-5"></i>
                    {% else %}
                        <i class="fas fa-info-circle me-2 fs-5"></i>
                    {% endif %}
                    <span>{{ message }}</span>
                </div>
                <button type="button" class="btn-close me-2 m-auto {% if message.tags == 'error' or message.tags == 'success' %}btn-close-white{% endif %}" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    {% endfor %}
</div>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        var toastElList = [].slice.call(document.querySelectorAll('.toast'));
        var toastList = toastElList.map(function (toastEl) {
            return new bootstrap.Toast(toastEl);
        });
        toastList.forEach(toast => toast.show());
    });
</script>
{% endif %}
